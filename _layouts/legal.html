---
layout: default
body_class: subpage
---
<main class="legal-shell">
  <article class="policy-content">
    {% if page.back_url and page.back_label %}
      <a href="{{ page.back_url | relative_url }}" class="back-link"><i class="fas fa-arrow-left"></i> {{ page.back_label }}</a>
    {% endif %}
    {{ content }}
  </article>
</main>
